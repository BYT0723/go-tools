linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell

linters-settings:
  misspell:
    locale: US

issues:
  exclude-rules:
    # goconvey dot imports
    - path: _test\.go
      linters:
        - errcheck
        - unused
    # Chinese comments are intentional
    - text: "misspell"
      source: "// .*[\u4e00-\u9fff]"
  exclude-generated: strict
  max-issues-per-linter: 0
  max-same-issues: 0
