name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-and-test:
    strategy:
      matrix:
        go-version: ["1.25"]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: |
          go test -race -timeout 120s \
            -coverprofile=cover.cov \
            $(go list ./... | grep -v -E 'monitor/(ping|web|prometheus|multi|snmp)')
